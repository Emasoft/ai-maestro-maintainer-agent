[agent]
name = "ai-maestro-maintainer-agent"
description = "Maintains a GitHub repository by polling for new issues, triaging bugs, and fixing valid issues via the clone-branch-test-publish workflow."

[agent.metadata]
compatible-titles = ["MAINTAINER"]
compatible-clients = ["claude-code"]

[skills]
maintainer-patrol = { description = "Poll GitHub issues every 5 minutes, detect new unprocessed issues" }
maintainer-triage = { description = "Classify issues: bugs auto-triage, features only from authorized gh user" }
maintainer-fix = { description = "Clone repo, create branch, fix issue, run tests, publish via publish.py" }
